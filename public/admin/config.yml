backend:
  name: git-gateway
  branch: main

local_backend: true
display_url: https://usdtl31.netlify.app

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "activites"
    label: "Activités & Actualités"
    folder: "src/content/activites"
    extension: "md"
    format: "frontmatter"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Titre", name: "title", widget: "string"}
      - {label: "Date de publication", name: "date", widget: "datetime"}
      - {label: "Catégorie", name: "category", widget: "select", options: ["Négociations", "Juridique", "Grèves & Mouvements", "Actualité Générale"]}
      - {label: "Image de couverture", name: "image", widget: "image", required: false}
      - {label: "Résumé", name: "summary", widget: "text"}
      - {label: "Corps de l'article", name: "body", widget: "markdown"}
