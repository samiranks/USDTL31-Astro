backend:
  name: github
  repo: samiranks/USDTL31-Astro
  branch: main
  base_url: https://sveltia-cms-auth.pages.dev

local_backend: true
display_url: https://usdtl31.pages.dev

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "activites"
    label: "Activités & Actualités"
    folder: "src/content/activites"
    extension: "md"
    format: "frontmatter"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Titre", name: "title", widget: "string"}
      - {label: "Date de publication", name: "date", widget: "datetime"}
      - {label: "Catégorie", name: "category", widget: "select", options: ["Négociations", "Juridique", "Grèves & Mouvements", "Actualité Générale"]}
      - {label: "Image de couverture", name: "image", widget: "image", required: false}
      - {label: "Résumé", name: "summary", widget: "text"}
      - {label: "Corps de l'article", name: "body", widget: "markdown"}
  
  - name: "adhesions"
    label: "Adhésions & Inscriptions"
    folder: "src/content/adhesions"
    extension: "json"
    format: "json"
    create: false # Read-only log
    slug: "{{year}}-{{month}}-{{day}}-{{fields.nom}}-{{fields.prenom}}"
    editor:
      preview: false
    fields:
      - {label: "Nom", name: "nom", widget: "string"}
      - {label: "Prénom", name: "prenom", widget: "string"}
      - {label: "Email", name: "email", widget: "string"}
      - {label: "Téléphone", name: "tel", widget: "string"}
      - {label: "Entreprise", name: "entreprise", widget: "string"}
      - {label: "Fonction", name: "fonction", widget: "string"}
      - {label: "Type de contrat", name: "contrat", widget: "string"}
      - {label: "Temps de travail", name: "temps", widget: "string"}
      - {label: "Cotisation annuelle", name: "cotisation", widget: "string"}
      - {label: "Fréquence", name: "frequence", widget: "string"}
      - {label: "Date de soumission", name: "date", widget: "datetime"}
